<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portuguese & Hebrew Lessons</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --pix: #32bcad;
            --text: #1f2937;
            --bg: #f9fafb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 12px;
            color: var(--text);
        }

        p {
            color: #6b7280;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .pix-container {
            background-color: #f3f4f6;
            padding: 24px;
            border-radius: 16px;
        }

        .label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--pix);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        .key-display {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 16px;
            word-break: break-all;
        }

        button {
            width: 100%;
            background-color: var(--pix);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #2aa395;
            box-shadow: 0 4px 12px rgba(50, 188, 173, 0.3);
        }

        .copied-msg {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #059669;
            font-weight: 600;
            display: none;
        }

        .support-text {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🌍</div>
    <h1>Premium Content</h1>
    <p>Get access to all Portuguese and Hebrew exercises by supporting our work.</p>

    <div class="pix-container">
        <span class="label">Official Pix Key</span>
        
        <div class="key-display" id="pixKey">11962049438</div>

        <button onclick="copyKey()">Copy Pix Key</button>
        <div id="success" class="copied-msg">✓ Copied! Paste it in your bank app.</div>
    </div>

    <div class="support-text">
        Instruction: Open your Brazilian bank app, choose "Pay with Pix" and paste the key above.
    </div>
</div>

<script>
    function copyKey() {
        const textToCopy = document.getElementById("pixKey").innerText;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            const msg = document.getElementById("success");
            msg.style.display = "block";
            
            setTimeout(() => {
                msg.style.display = "none";
            }, 4000);
        });
    }
</script>

</body>
</html>
